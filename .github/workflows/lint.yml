name: Lint

on:
  workflow_call:

permissions:
  contents: write
  pull-requests: write

jobs:
  fmt:
    name: Rustfmt
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Run cargo fmt
        run: cargo fmt --all

      - name: Check for changes
        id: fmt-changes
        run: |
          if git diff --quiet; then
            echo "has_changes=false" >> $GITHUB_OUTPUT
          else
            echo "has_changes=true" >> $GITHUB_OUTPUT
          fi

      - name: Create Pull Request
        if: steps.fmt-changes.outputs.has_changes == 'true'
        uses: peter-evans/create-pull-request@v8
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "chore: auto-fix formatting issues"
          branch: auto-fix/fmt
          delete-branch: true
          title: "chore: auto-fix formatting issues"
          body: |
            ## Auto-generated PR
            
            `cargo fmt --all` found and fixed formatting issues.
            
            Please review the changes before merging.
          labels: |
            automated
            lint

  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Run cargo clippy
        run: cargo clippy --all-targets --all-features --fix --allow-dirty --allow-staged

      - name: Check for changes
        id: clippy-changes
        run: |
          if git diff --quiet; then
            echo "has_changes=false" >> $GITHUB_OUTPUT
          else
            echo "has_changes=true" >> $GITHUB_OUTPUT
          fi

      - name: Create Pull Request
        if: steps.clippy-changes.outputs.has_changes == 'true'
        uses: peter-evans/create-pull-request@v8
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "chore: auto-fix clippy warnings"
          branch: auto-fix/clippy
          delete-branch: true
          title: "chore: auto-fix clippy warnings"
          body: |
            ## Auto-generated PR
            
            `cargo clippy --fix` found and fixed lint warnings.
            
            Please review the changes before merging.
          labels: |
            automated
            lint

  doc:
    name: Documentation
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Check documentation
        run: RUSTDOCFLAGS="-D warnings" cargo doc --no-deps --all-features

  check:
    name: Cargo Check
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - id: default
            command: cargo check --all-targets
          - id: all-features
            command: cargo check --all-targets --all-features
          - id: no-default
            command: cargo check --all-targets --no-default-features
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.id }}

      - name: Run cargo check
        run: ${{ matrix.command }}

  deny:
    name: Cargo Deny
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo-deny
        uses: actions/cache@v5
        with:
          path: ~/.cargo/bin/cargo-deny
          key: ${{ runner.os }}-cargo-deny-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-deny-

      - name: Install cargo-deny
        run: |
          if ! command -v cargo-deny &> /dev/null; then
            cargo install cargo-deny
          fi

      - name: Run cargo-deny
        run: cargo deny check

  audit:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo-audit
        uses: actions/cache@v5
        with:
          path: ~/.cargo/bin/cargo-audit
          key: ${{ runner.os }}-cargo-audit-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-audit-

      - name: Install cargo-audit
        run: |
          if ! command -v cargo-audit &> /dev/null; then
            cargo install cargo-audit
          fi

      - name: Run cargo-audit
        run: cargo audit

  geiger:
    name: Cargo Geiger
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@nightly

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Cache cargo-geiger
        uses: actions/cache@v5
        with:
          path: ~/.cargo/bin/cargo-geiger
          key: ${{ runner.os }}-cargo-geiger

      - name: Install cargo-geiger
        run: |
          if ! command -v cargo-geiger &> /dev/null; then
            cargo install cargo-geiger --locked
          fi

      - name: Run cargo-geiger
        run: |
          cargo +nightly geiger --all-features --output-format GitHubMarkdown > geiger-report.md 2>&1 || true

      - name: Upload Geiger Report
        uses: actions/upload-artifact@v7
        with:
          name: geiger-report-${{ github.sha }}
          path: geiger-report.md
          retention-days: 30

      - name: Summary
        run: |
          echo "## Cargo Geiger Report" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          tail -n 50 geiger-report.md >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

  semver:
    name: Semver Checks
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Cache cargo-semver-checks
        uses: actions/cache@v5
        with:
          path: ~/.cargo/bin/cargo-semver-checks
          key: ${{ runner.os }}-cargo-semver-checks

      - name: Install cargo-semver-checks
        run: |
          if ! command -v cargo-semver-checks &> /dev/null; then
            cargo install cargo-semver-checks --locked
          fi

      - name: Run cargo-semver-checks
        run: cargo semver-checks check-release --all-features
        continue-on-error: true
