name: Lint

on:
  workflow_call:

permissions:
  contents: write
  pull-requests: write

jobs:
  fmt:
    name: Rustfmt
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: acta-cargo
          cache-on-failure: true

      - name: Run cargo fmt
        run: cargo fmt --all

      - name: Check for changes
        id: fmt-changes
        run: python3 scripts/check-git-diff.py

      - name: Create Pull Request
        if: steps.fmt-changes.outputs.has_changes == 'true'
        uses: peter-evans/create-pull-request@v8
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "chore: auto-fix formatting issues"
          branch: auto-fix/fmt
          delete-branch: true
          title: "chore: auto-fix formatting issues"
          body: |
            ## Auto-generated PR
            
            `cargo fmt --all` found and fixed formatting issues.
            
            Please review the changes before merging.
          labels: |
            automated
            lint

  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: acta-cargo
          cache-on-failure: true

      - name: Run cargo clippy
        run: cargo clippy --all-targets --all-features --fix --allow-dirty --allow-staged

      - name: Check for changes
        id: clippy-changes
        run: python3 scripts/check-git-diff.py

      - name: Create Pull Request
        if: steps.clippy-changes.outputs.has_changes == 'true'
        uses: peter-evans/create-pull-request@v8
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "chore: auto-fix clippy warnings"
          branch: auto-fix/clippy
          delete-branch: true
          title: "chore: auto-fix clippy warnings"
          body: |
            ## Auto-generated PR
            
            `cargo clippy --fix` found and fixed lint warnings.
            
            Please review the changes before merging.
          labels: |
            automated
            lint

  doc:
    name: Documentation
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: acta-cargo
          cache-on-failure: true

      - name: Check documentation
        run: RUSTDOCFLAGS="-D warnings" cargo doc --no-deps --all-features

  check:
    name: Cargo Check
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - id: default
            command: cargo check --all-targets
          - id: all-features
            command: cargo check --all-targets --all-features
          - id: no-default
            command: cargo check --all-targets --no-default-features
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: acta-cargo
          cache-on-failure: true

      - name: Run cargo check
        run: ${{ matrix.command }}

  deny:
    name: Cargo Deny
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: acta-cargo
          cache-on-failure: true

      - name: Cache cargo-deny
        uses: actions/cache@v5
        with:
          path: ~/.cargo/bin/cargo-deny
          key: ${{ runner.os }}-cargo-tool-deny-v1

      - name: Install cargo-deny
        run: python3 scripts/ensure-tool.py cargo-deny -- cargo install cargo-deny

      - name: Run cargo-deny
        run: cargo deny check

  audit:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: acta-cargo
          cache-on-failure: true

      - name: Cache cargo-audit
        uses: actions/cache@v5
        with:
          path: ~/.cargo/bin/cargo-audit
          key: ${{ runner.os }}-cargo-tool-audit-v1

      - name: Install cargo-audit
        run: python3 scripts/ensure-tool.py cargo-audit -- cargo install cargo-audit

      - name: Run cargo-audit
        run: cargo audit

  geiger:
    name: Cargo Geiger
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@nightly

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: acta-cargo-nightly
          cache-on-failure: true

      - name: Cache cargo-geiger
        uses: actions/cache@v5
        with:
          path: ~/.cargo/bin/cargo-geiger
          key: ${{ runner.os }}-cargo-tool-geiger-v1

      - name: Install cargo-geiger
        run: python3 scripts/ensure-tool.py cargo-geiger -- cargo install cargo-geiger --locked

      - name: Run cargo-geiger
        run: python3 scripts/geiger-run.py

      - name: Upload Geiger Report
        uses: actions/upload-artifact@v7
        with:
          name: geiger-report-${{ github.sha }}
          path: geiger-report.md
          retention-days: 30

      - name: Summary
        run: python3 scripts/geiger-summary.py

  semver:
    name: Semver Checks
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: acta-cargo
          cache-on-failure: true

      - name: Cache cargo-semver-checks
        uses: actions/cache@v5
        with:
          path: ~/.cargo/bin/cargo-semver-checks
          key: ${{ runner.os }}-cargo-tool-semver-checks-v1

      - name: Install cargo-semver-checks
        run: python3 scripts/ensure-tool.py cargo-semver-checks -- cargo install cargo-semver-checks --locked

      - name: Run cargo-semver-checks
        run: cargo semver-checks check-release --all-features
        continue-on-error: true
