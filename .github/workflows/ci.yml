name: CI

on:
  push:
    branches: ["*"]
  pull_request:
    branches: ["*"]

permissions:
  contents: read

jobs:
  lint:
    name: Lint
    uses: ./.github/workflows/lint.yml
    permissions:
      contents: read

  build:
    name: Build
    uses: ./.github/workflows/build.yml
    permissions:
      contents: read

  test:
    name: Test
    uses: ./.github/workflows/test.yml
    permissions:
      contents: read
