name: Test

on:
  workflow_call:

permissions:
  contents: read

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - id: default
            command: cargo test --all
          - id: all-features
            command: cargo test --all --all-features
          - id: no-default
            command: cargo test --all --no-default-features
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: caelum-cargo
          cache-on-failure: true

      - name: Run tests
        run: ${{ matrix.command }}
