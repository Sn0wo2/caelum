name: Test

on:
  workflow_call:

permissions:
  contents: read

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - id: default
            make_target: test-all
          - id: all-features
            make_target: test
          - id: no-default
            make_target: test-no-default
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: acta-cargo
          cache-on-failure: true

      - name: Run tests
        run: make ${{ matrix.make_target }}
