name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Version to release (e.g. 0.1.0)"
        required: true
        type: string
      snapshot:
        description: "Snapshot mode (no bump, no tag, no publish)"
        type: boolean
        default: false

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always
  CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-gnu,x86_64-pc-windows-gnu,aarch64-unknown-linux-gnu,armv7-unknown-linux-gnueabihf

      - name: Install rust-src
        run: rustup component add rust-src

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: caelum-cargo
          cache-on-failure: true

      - name: Set up Zig
        uses: mlugg/setup-zig@v2
        with:
          version: 0.13.0

      - name: Cache cargo-zigbuild
        uses: actions/cache@v5
        with:
          path: ~/.cargo/bin/cargo-zigbuild
          key: ${{ runner.os }}-cargo-tool-zigbuild-v1

      - name: Install cargo-zigbuild
        run: |
          command -v cargo-zigbuild &> /dev/null || pip3 install cargo-zigbuild

      - name: Ensure build script is executable
        run: chmod +x scripts/cargo-or-zigbuild.py
      - name: Determine version
        if: github.event_name != 'workflow_dispatch' || !inputs.snapshot
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_ENV"
          else
            echo "VERSION=${{ inputs.version }}" >> "$GITHUB_ENV"
          fi

      - name: Bump version
        if: github.event_name != 'workflow_dispatch' || !inputs.snapshot
        run: |
          cargo install cargo-edit --locked
          cargo set-version -p caelum-build "$VERSION"
          cargo set-version -p caelum "$VERSION"
          cargo update -w

      - name: Commit and tag
        if: github.event_name != 'workflow_dispatch' || !inputs.snapshot
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git commit -am "chore: release v$VERSION"
          if [ "${{ github.event_name }}" = "push" ]; then
            git tag -f "v$VERSION"
          else
            git tag "v$VERSION"
          fi

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v7
        with:
          distribution: goreleaser
          version: "~> v2"
          args: >
            release
            --clean
            --skip=before
            ${{ github.event_name == 'workflow_dispatch' && inputs.snapshot && '--snapshot' || '' }}
            --config .goreleaser.yml
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Push version bump
        if: github.event_name != 'workflow_dispatch' || !inputs.snapshot
        run: |
          git push origin "v$VERSION" --force
          git push origin HEAD

      - name: Publish caelum-build to crates.io
        if: github.event_name != 'workflow_dispatch' || !inputs.snapshot
        run: cargo publish --manifest-path crates/caelum-build/Cargo.toml --allow-dirty

      - name: Publish caelum to crates.io
        if: github.event_name != 'workflow_dispatch' || !inputs.snapshot
        run: cargo publish --allow-dirty

      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: ${{ github.event_name == 'workflow_dispatch' && inputs.snapshot && 'snapshot-artifacts' || 'release-artifacts' }}
          path: dist/*
          retention-days: ${{ github.event_name == 'workflow_dispatch' && inputs.snapshot && 7 || 30 }}
