name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Version to release (e.g. 0.1.0)"
        required: true
        type: string
      snapshot:
        description: "Snapshot mode (no publish, no tag, no PR)"
        type: boolean
        default: false

permissions:
  contents: write
  pull-requests: write

env:
  CARGO_TERM_COLOR: always
  CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

jobs:
  bump:
    name: Bump Version
    if: github.event_name == 'workflow_dispatch' && !inputs.snapshot
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo-edit
        uses: actions/cache@v5
        with:
          path: ~/.cargo/bin/cargo-set-version
          key: ${{ runner.os }}-cargo-tool-edit-v1

      - name: Install cargo-edit
        run: |
          command -v cargo-set-version &> /dev/null || cargo install cargo-edit

      - name: Bump versions
        run: |
          cargo set-version -p caelum-build "${{ inputs.version }}"
          cargo set-version -p caelum "${{ inputs.version }}"
          cargo update -w

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v8
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "chore: release v${{ inputs.version }}"
          branch: release/v${{ inputs.version }}
          delete-branch: true
          title: "chore: release v${{ inputs.version }}"
          body: |
            Bumps all crate versions to `${{ inputs.version }}`.

            After merging, push the tag to trigger the release:
            ```bash
            git pull
            git tag v${{ inputs.version }}
            git push origin v${{ inputs.version }}
            ```
          labels: |
            automated
            release

  snapshot:
    name: Snapshot Build
    if: github.event_name == 'workflow_dispatch' && inputs.snapshot
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-gnu,x86_64-pc-windows-gnu,aarch64-unknown-linux-gnu,armv7-unknown-linux-gnueabihf

      - name: Install rust-src
        run: rustup component add rust-src

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: caelum-cargo
          cache-on-failure: true

      - name: Set up Zig
        uses: mlugg/setup-zig@v2
        with:
          version: 0.13.0

      - name: Cache cargo-zigbuild
        uses: actions/cache@v5
        with:
          path: ~/.cargo/bin/cargo-zigbuild
          key: ${{ runner.os }}-cargo-tool-zigbuild-v1

      - name: Install cargo-zigbuild
        run: |
          command -v cargo-zigbuild &> /dev/null || pip3 install cargo-zigbuild

      - name: Prepare scripts
        run: chmod +x ./scripts/cargo-or-zigbuild.py

      - name: Run GoReleaser snapshot
        uses: goreleaser/goreleaser-action@v7
        with:
          distribution: goreleaser
          version: "~> v2"
          args: release --snapshot --clean --skip=before --config .goreleaser.yml
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload snapshot artifacts
        uses: actions/upload-artifact@v7
        with:
          name: snapshot-artifacts
          path: dist/*
          retention-days: 7

  release:
    name: Release
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-gnu,x86_64-pc-windows-gnu,aarch64-unknown-linux-gnu,armv7-unknown-linux-gnueabihf

      - name: Install rust-src
        run: rustup component add rust-src

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: caelum-cargo
          cache-on-failure: true

      - name: Set up Zig
        uses: mlugg/setup-zig@v2
        with:
          version: 0.13.0

      - name: Cache cargo-zigbuild
        uses: actions/cache@v5
        with:
          path: ~/.cargo/bin/cargo-zigbuild
          key: ${{ runner.os }}-cargo-tool-zigbuild-v1

      - name: Install cargo-zigbuild
        run: |
          command -v cargo-zigbuild &> /dev/null || pip3 install cargo-zigbuild

      - name: Prepare scripts
        run: chmod +x ./scripts/cargo-or-zigbuild.py

      - name: Run GoReleaser release
        uses: goreleaser/goreleaser-action@v7
        with:
          distribution: goreleaser
          version: "~> v2"
          args: release --clean --skip=before --config .goreleaser.yml
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish caelum-build to crates.io
        run: cargo publish --manifest-path crates/caelum-build/Cargo.toml --allow-dirty

      - name: Publish caelum to crates.io
        run: cargo publish --allow-dirty

      - name: Upload release artifacts
        uses: actions/upload-artifact@v7
        with:
          name: release-artifacts
          path: dist/*
          retention-days: 30
