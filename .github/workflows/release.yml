name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Version to release (e.g. 0.1.0)"
        required: true
        type: string
      snapshot:
        description: "Snapshot mode (no bump, no tag, no publish)"
        type: boolean
        default: false

permissions:
  contents: write
  pull-requests: write

env:
  CARGO_TERM_COLOR: always
  CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    concurrency:
      group: ${{ github.workflow }}-${{ github.event_name == 'workflow_dispatch' && !inputs.snapshot && inputs.version || github.ref }}
      cancel-in-progress: false
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-gnu,x86_64-pc-windows-gnu,aarch64-unknown-linux-gnu,armv7-unknown-linux-gnueabihf

      - name: Install rust-src
        run: rustup component add rust-src

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: acta-cargo
          cache-on-failure: true

      - name: Set up Zig
        uses: mlugg/setup-zig@v2
        with:
          version: 0.13.0

      - name: Install cargo tools
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-zigbuild,cargo-edit

      - name: Ensure build script is executable
        run: chmod +x scripts/cargo-or-zigbuild.py

      - name: Determine version
        if: github.event_name != 'workflow_dispatch' || !inputs.snapshot
        run: python3 scripts/release-determine-version.py "${{ inputs.version }}"

      - name: Verify version matches tag
        if: github.event_name == 'push'
        run: python3 scripts/release-verify-version.py "$VERSION"

      - name: Bump version
        if: github.event_name == 'workflow_dispatch' && !inputs.snapshot
        run: cargo set-version "$VERSION"

      - name: Create Pull Request
        if: github.event_name == 'workflow_dispatch' && !inputs.snapshot
        uses: peter-evans/create-pull-request@v8
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: bump-version-${{ env.VERSION }}
          title: "chore(release): bump version to ${{ env.VERSION }}"
          body: "Automated version bump to ${{ env.VERSION }}."
          commit-message: "chore(release): bump version to ${{ env.VERSION }}"
          delete-branch: true

      - name: Clean up build artifacts
        if: github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && inputs.snapshot)
        run: rm -rf .zig-cache/

      - name: Run GoReleaser
        if: github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && inputs.snapshot)
        uses: goreleaser/goreleaser-action@v7
        with:
          distribution: goreleaser
          version: "~> v2"
          args: >
            release
            --clean
            --skip=before
            ${{ github.event_name == 'workflow_dispatch' && inputs.snapshot && '--snapshot' || '' }}
            --config .goreleaser.yml
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish to crates.io
        if: github.event_name == 'push'
        uses: katyo/publish-crates@v2
        with:
          registry-token: ${{ secrets.CARGO_REGISTRY_TOKEN }}
          args: --allow-dirty

      - name: Upload artifacts
        if: github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && inputs.snapshot)
        uses: actions/upload-artifact@v7
        with:
          name: ${{ github.event_name == 'workflow_dispatch' && inputs.snapshot && 'snapshot-artifacts' || 'release-artifacts' }}
          path: dist/*
          retention-days: ${{ github.event_name == 'workflow_dispatch' && inputs.snapshot && 7 || 30 }}
