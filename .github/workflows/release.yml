name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: "Version to release (e.g. 0.1.1)"
        required: true
        type: string
      snapshot:
        description: "Snapshot mode (no bump, no tag, no publish)"
        type: boolean
        default: false

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always
  CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    concurrency:
      group: ${{ github.workflow }}-${{ github.ref_name }}
      cancel-in-progress: false
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-gnu,x86_64-pc-windows-gnu,aarch64-unknown-linux-gnu,armv7-unknown-linux-gnueabihf,x86_64-apple-darwin,aarch64-apple-darwin

      - name: Install rust-src
        run: rustup component add rust-src

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: acta-cargo
          cache-on-failure: true

      - name: Set up Zig
        uses: mlugg/setup-zig@v2

      - name: Install cargo tools
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-zigbuild,cargo-edit
      - name: Install macOS SDK
        run: python3 scripts/install-macos-sdk.py
      - name: Ensure build script is executable
        run: chmod +x scripts/cargo-or-zigbuild.py

      - name: Normalize version
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            VERSION="${{ github.ref_name }}"
          else
            VERSION="${{ inputs.version }}"
          fi
          VERSION="${VERSION#v}"
          echo "VERSION=$VERSION" >> "$GITHUB_ENV"

      - name: Bump version
        if: "!inputs.snapshot"
        run: cargo set-version "$VERSION"

      - name: Commit version bump
        if: "!inputs.snapshot"
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --quiet || git commit -m "chore(release): bump version to $VERSION"

      - name: Tag release (Manual only)
        if: "github.event_name == 'workflow_dispatch' && !inputs.snapshot"
        run: git tag "v$VERSION"

      - name: Install GoReleaser
        uses: goreleaser/goreleaser-action@v7
        with:
          distribution: goreleaser
          version: "~> v2"
          install-only: true

      - name: Run GoReleaser
        if: "!inputs.snapshot"
        run: make release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GORELEASER_CURRENT_TAG: v${{ env.VERSION }}
          SDKROOT: /opt/MacOSX11.3.sdk

      - name: Run GoReleaser (snapshot)
        if: inputs.snapshot
        run: make release-snapshot
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GORELEASER_CURRENT_TAG: v${{ env.VERSION }}
          SDKROOT: /opt/MacOSX11.3.sdk
      - name: Push version bump to main
        if: "!inputs.snapshot"
        run: git push origin HEAD:main --tags

      - name: Publish to crates.io
        if: "!inputs.snapshot"
        uses: katyo/publish-crates@v2
        with:
          registry-token: ${{ secrets.CARGO_REGISTRY_TOKEN }}
          args: --allow-dirty

      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: ${{ inputs.snapshot && 'snapshot-artifacts' || 'release-artifacts' }}
          path: dist/*
          retention-days: ${{ inputs.snapshot && 7 || 30 }}
