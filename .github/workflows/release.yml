name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Version to release (e.g. 0.1.0)"
        required: true
        type: string
      snapshot:
        description: "Snapshot mode (no bump, no tag, no publish)"
        type: boolean
        default: false

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always
  CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-gnu,x86_64-pc-windows-gnu,aarch64-unknown-linux-gnu,armv7-unknown-linux-gnueabihf

      - name: Install rust-src
        run: rustup component add rust-src

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: acta-cargo
          cache-on-failure: true

      - name: Set up Zig
        uses: mlugg/setup-zig@v2
        with:
          version: 0.13.0

      - name: Cache cargo-zigbuild
        uses: actions/cache@v5
        with:
          path: ~/.cargo/bin/cargo-zigbuild
          key: ${{ runner.os }}-cargo-tool-zigbuild-v1

      - name: Install cargo-zigbuild
        run: python3 scripts/ensure-tool.py cargo-zigbuild -- pip3 install cargo-zigbuild

      - name: Ensure build script is executable
        run: chmod +x scripts/cargo-or-zigbuild.py

      - name: Determine version
        if: github.event_name != 'workflow_dispatch' || !inputs.snapshot
        run: python3 scripts/release-determine-version.py "${{ inputs.version }}"

      - name: Verify version matches tag
        if: github.event_name == 'push'
        run: python3 scripts/release-verify-version.py "$VERSION"

      - name: Bump version
        if: github.event_name == 'workflow_dispatch' && !inputs.snapshot
        run: |
          pip3 install -q tomlkit
          python3 scripts/release-bump-version.py "$VERSION"

      - name: Commit and tag
        if: github.event_name == 'workflow_dispatch' && !inputs.snapshot
        run: python3 scripts/release-git.py commit-and-tag "$VERSION"

      - name: Clean up build artifacts
        run: rm -rf .zig-cache/

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v7
        with:
          distribution: goreleaser
          version: "~> v2"
          args: >
            release
            --clean
            --skip=before
            ${{ github.event_name == 'workflow_dispatch' && inputs.snapshot && '--snapshot' || '' }}
            --config .goreleaser.yml
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Push version bump
        if: github.event_name == 'workflow_dispatch' && !inputs.snapshot
        run: python3 scripts/release-git.py push "$VERSION"

      - name: Publish acta-build to crates.io
        if: github.event_name != 'workflow_dispatch' || !inputs.snapshot
        run: cargo publish --manifest-path crates/acta-build/Cargo.toml --allow-dirty

      - name: Publish acta to crates.io
        if: github.event_name != 'workflow_dispatch' || !inputs.snapshot
        run: cargo publish --allow-dirty

      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: ${{ github.event_name == 'workflow_dispatch' && inputs.snapshot && 'snapshot-artifacts' || 'release-artifacts' }}
          path: dist/*
          retention-days: ${{ github.event_name == 'workflow_dispatch' && inputs.snapshot && 7 || 30 }}
