name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version to release (e.g. 0.1.1)"
        required: true
        type: string
      snapshot:
        description: "Snapshot mode (no bump, no tag, no publish)"
        type: boolean
        default: false

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always
  CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    concurrency:
      group: ${{ github.workflow }}-${{ inputs.snapshot && 'snapshot' || inputs.version }}
      cancel-in-progress: false
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-gnu,x86_64-pc-windows-gnu,aarch64-unknown-linux-gnu,armv7-unknown-linux-gnueabihf

      - name: Install rust-src
        run: rustup component add rust-src

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: acta-cargo
          cache-on-failure: true

      - name: Set up Zig
        uses: mlugg/setup-zig@v2
        with:
          version: 0.13.0

      - name: Install cargo tools
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-zigbuild,cargo-edit

      - name: Ensure build script is executable
        run: chmod +x scripts/cargo-or-zigbuild.py

      - name: Normalize version
        run: |
          VERSION="${{ inputs.version }}"
          VERSION="${VERSION#v}"
          echo "VERSION=$VERSION" >> "$GITHUB_ENV"

      - name: Bump version
        if: '!inputs.snapshot'
        run: cargo set-version "$VERSION"

      - name: Commit version bump
        if: '!inputs.snapshot'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --quiet || git commit -m "chore(release): bump version to ${VERSION}"
        if: '!inputs.snapshot'
        env:
          VERSION: ${{ env.VERSION }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --quiet || git commit -m "chore(release): bump version to $VERSION"

      - name: Push version bump
        if: '!inputs.snapshot'
        run: git push origin HEAD:main

      - name: Tag release
        if: '!inputs.snapshot'
        run: |
          git tag "v${VERSION}"
          git push origin "v${VERSION}"
        if: '!inputs.snapshot'
        env:
          VERSION: ${{ env.VERSION }}
        run: |
          git tag "v$VERSION"
          git push origin "v$VERSION"

      - name: Clean up build artifacts
        run: rm -rf .zig-cache/

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v7
        with:
          distribution: goreleaser
          version: "~> v2"
          args: >
            release
            --clean
            --skip=before
            ${{ inputs.snapshot && '--snapshot' || '' }}
            --config .goreleaser.yml
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish to crates.io
        if: '!inputs.snapshot'
        uses: katyo/publish-crates@v2
        with:
          registry-token: ${{ secrets.CARGO_REGISTRY_TOKEN }}
          args: --allow-dirty

      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: ${{ inputs.snapshot && 'snapshot-artifacts' || 'release-artifacts' }}
          path: dist/*
          retention-days: ${{ inputs.snapshot && 7 || 30 }}
