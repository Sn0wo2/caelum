[package]
name = "sage-trace"
version = "0.1.0"
edition = "2024"
description = "A beautiful, customizable logging library for Rust"
repository = "https://github.com/Sn0wo2/sage-trace"
keywords = ["tracing", "logging", "formatting", "colors", "theme"]
categories = ["development-tools::debugging", "development-tools::profiling"]
exclude = ["src/debug/", ".github/", ".idea/", "img.png"]

[features]
default = ["unicode"]
serde = ["dep:serde"]
unicode = []
nerd = ["dep:nerd-font-symbols"]

[dependencies]
anyhow = "1.0"
chrono = { version = "0.4", default-features = false, features = ["clock"] }
flate2 = { version = "1.1.9", default-features = false, features = ["miniz_oxide"] }
owo-colors = "4.3.0"
serde = { version = "1", features = ["derive"], optional = true }
tracing = "0.1"
tracing-appender = "0.2"
nerd-font-symbols = { version = "0.3.0", optional = true }

[dependencies.tracing-subscriber]
version = "0.3"
features = ["env-filter", "fmt", "json", "registry", "ansi", "std"]

[build-dependencies]
sage-trace-build = { version = "0.1.0", path = "crates/sage-trace-build" }
[[bin]]
name = "debug"
path = "src/debug/debug.rs"
